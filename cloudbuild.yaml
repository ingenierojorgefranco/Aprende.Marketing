steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "europe-southwest1-docker.pkg.dev/$PROJECT_ID/generatorladingdeployend/generatorladingdeployend:$SHORT_SHA"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "europe-southwest1-docker.pkg.dev/$PROJECT_ID/generatorladingdeployend/generatorladingdeployend:$SHORT_SHA"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "generatorladingdeployend"
      - "--image"
      - "europe-southwest1-docker.pkg.dev/$PROJECT_ID/generatorladingdeployend/generatorladingdeployend:$SHORT_SHA"
      - "--region"
      - "europe-southwest1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"

images:
  - "europe-southwest1-docker.pkg.dev/$PROJECT_ID/generatorladingdeployend/generatorladingdeployend:$SHORT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
